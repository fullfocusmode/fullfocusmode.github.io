<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FullFocus Journal</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>
    <div id="sidebarContainer"></div>

    <div class="main-content">
        <div class="top-bar">
            <button id="openSidebar"><i class="fas fa-bars"></i></button>
            <h1>Journal</h1>
            <button id="newEntryBtn" class="btn-primary"><i class="fas fa-plus"></i> New Entry</button>
        </div>

        <div class="journal-grid">
            <div class="box journal-entries">
                <div class="entries-header">
                    <h2>Journal Entries</h2>
                    <div class="entries-filter">
                        <input type="text" id="searchEntries" placeholder="Search entries...">
                        <select id="filterEntries">
                            <option value="all">All Entries</option>
                            <option value="today">Today</option>
                            <option value="week">This Week</option>
                            <option value="month">This Month</option>
                        </select>
                    </div>
                </div>
                <div id="entriesList"></div>
            </div>
            
            <div class="box entry-editor">
                <div id="editorContent">
                    <div class="editor-toolbar">
                        <button data-command="bold"><i class="fas fa-bold"></i></button>
                        <button data-command="italic"><i class="fas fa-italic"></i></button>
                        <button data-command="underline"><i class="fas fa-underline"></i></button>
                        <button data-command="insertUnorderedList"><i class="fas fa-list"></i></button>
                        <button data-command="insertOrderedList"><i class="fas fa-list-ol"></i></button>
                        <button data-command="createLink"><i class="fas fa-link"></i></button>
                    </div>
                    <div id="editor" contenteditable="true"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="entryModal" class="modal">
        <div class="modal-content">
            <h2>New Journal Entry</h2>
            <form id="entryForm">
                <input type="text" id="entryTitle" placeholder="Entry Title" required>
                <input type="datetime-local" id="entryDate" required>
                <textarea id="entryContent" placeholder="Write your thoughts..." required></textarea>
                <div class="entry-tags">
                    <input type="text" id="entryTags" placeholder="Tags (comma-separated)">
                </div>
                <div class="entry-mood">
                    <label>Mood:</label>
                    <div class="mood-selector">
                        <button type="button" data-mood="great"><i class="fas fa-laugh"></i></button>
                        <button type="button" data-mood="good"><i class="fas fa-smile"></i></button>
                        <button type="button" data-mood="neutral"><i class="fas fa-meh"></i></button>
                        <button type="button" data-mood="bad"><i class="fas fa-frown"></i></button>
                        <button type="button" data-mood="terrible"><i class="fas fa-sad-tear"></i></button>
                    </div>
                </div>
                <div class="modal-buttons">
                    <button type="submit">Save</button>
                    <button type="button" class="cancel">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="journal.js"></script>
</body>
</html>
