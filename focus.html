<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FullFocus Mode</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>
    <div id="sidebarContainer"></div>

    <div class="main-content">
        <div class="top-bar">
            <button id="openSidebar"><i class="fas fa-bars"></i></button>
            <h1>Focus Mode</h1>
            <div class="focus-controls">
                <button id="startFocus" class="btn-primary">Start Focus Session</button>
                <button id="settingsBtn"><i class="fas fa-cog"></i></button>
            </div>
        </div>

        <div class="focus-container">
            <div class="box focus-timer">
                <div class="timer-display">
                    <div class="time">25:00</div>
                    <div class="phase">Focus Time</div>
                </div>
                <div class="timer-controls">
                    <button id="pauseTimer" disabled><i class="fas fa-pause"></i></button>
                    <button id="resetTimer"><i class="fas fa-redo"></i></button>
                </div>
                <div class="session-progress">
                    <div class="progress-bar">
                        <div class="progress" style="width: 0%"></div>
                    </div>
                    <span class="progress-text">Session 1/4</span>
                </div>
            </div>

            <div class="box focus-tasks">
                <h2>Current Focus Tasks</h2>
                <div id="focusTasks"></div>
            </div>

            <div class="box focus-stats">
                <h2>Focus Statistics</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-value" id="totalFocusTime">0</span>
                        <span class="stat-label">Minutes Focused Today</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="completedSessions">0</span>
                        <span class="stat-label">Sessions Completed</span>
                    </div>
                </div>
                <canvas id="focusChart"></canvas>
            </div>
        </div>
    </div>

    <div id="focusSettingsModal" class="modal">
        <div class="modal-content">
            <h2>Focus Settings</h2>
            <form id="focusSettingsForm">
                <div class="setting-item">
                    <label>Focus Duration (minutes)</label>
                    <input type="number" id="focusDuration" value="25" min="1" max="60">
                </div>
                <div class="setting-item">
                    <label>Break Duration (minutes)</label>
                    <input type="number" id="breakDuration" value="5" min="1" max="30">
                </div>
                <div class="setting-item">
                    <label>Long Break Duration (minutes)</label>
                    <input type="number" id="longBreakDuration" value="15" min="1" max="60">
                </div>
                <div class="setting-item">
                    <label>Sessions until Long Break</label>
                    <input type="number" id="sessionsCount" value="4" min="1" max="10">
                </div>
                <div class="modal-buttons">
                    <button type="submit">Save</button>
                    <button type="button" class="cancel">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="focus.js"></script>
</body>
</html>
