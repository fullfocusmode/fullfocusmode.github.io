<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FullFocus Timer</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>
    <div id="sidebarContainer"></div>

    <div class="main-content">
        <div class="top-bar">
            <button id="openSidebar"><i class="fas fa-bars"></i></button>
            <h1>Custom Timer</h1>
        </div>

        <div class="timer-container">
            <div class="box timer-display">
                <div class="time">00:00:00</div>
                <div class="timer-controls">
                    <input type="number" id="hours" placeholder="Hours" min="0" max="23">
                    <input type="number" id="minutes" placeholder="Minutes" min="0" max="59">
                    <input type="number" id="seconds" placeholder="Seconds" min="0" max="59">
                    <button id="startTimer" class="btn-primary"><i class="fas fa-play"></i></button>
                    <button id="pauseTimer" class="btn-primary" disabled><i class="fas fa-pause"></i></button>
                    <button id="resetTimer" class="btn-primary"><i class="fas fa-redo"></i></button>
                </div>
                <div class="timer-presets">
                    <button data-time="300">5 min</button>
                    <button data-time="600">10 min</button>
                    <button data-time="1500">25 min</button>
                    <button data-time="3600">1 hour</button>
                </div>
            </div>
        </div>
    </div>
    <script src="timer.js"></script>
</body>
</html>
